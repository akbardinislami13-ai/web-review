<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review Netizen</title>
  <link href="./css/bootstrap.min.css" rel="stylesheet">
<link href="./css/custom.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>
<body class="custom-scroll">
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Review Netizen</a>
    </div>
  </nav>

  <section class="hero-section">
    <div class="container text-center position-relative">
      <h1 class="display-3 fw-bold mb-4">Review Netizen</h1>
      <p class="lead text-white fs-4">Kasih rating ⭐ dan komentar Sesuka lo!</p>
    </div>
  </section>

  <div class="container my-5 pt-5">
    <div class="alert alert-warning text-center rounded-4 shadow-lg" role="alert">
      🎉 Isi form untuk menambahkan review lo!
    </div>
  </div>

  <div class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card form-card shadow-lg">
          <div class="card-body p-5">
            <h3 class="card-title text-center mb-4">✨ Tambah Review</h3>
            <form id="reviewForm">
              <div class="mb-4">
                <label class="form-label fw-bold mb-3">📖 Judul Buku/Film</label>
                <input type="text" id="judul" class="form-control form-control-lg" placeholder="Contoh: Dune atau Atomic Habits" required>
              </div>
              
              <div class="mb-4">
                <label class="form-label fw-bold mb-3">📚 Tipe</label>
                <select id="tipe" class="form-select form-control-lg">
                  <option value="Buku">📚 Buku</option>
                  <option value="Film">🎥 Film</option>
                </select>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold mb-3">⭐ Rating</label>
                <div class="rating-stars" id="ratingStars">
                  <img src="./bintang.png" data-rating="1" alt="1 star">
                  <img src="./bintang.png" data-rating="2" alt="2 stars">
                  <img src="./bintang.png" data-rating="3" alt="3 stars">
                  <img src="./bintang.png" data-rating="4" alt="4 stars">
                  <img src="./bintang.png" data-rating="5" alt="5 stars">
                </div>
                <input type="hidden" id="rating" value="0">
              </div>
              
              <div class="mb-4">
                <label class="form-label fw-bold mb-3">💭 Komentar</label>
                <div class="position-relative mb-3">
                  <textarea id="komentar" class="form-control form-control-lg" rows="4" placeholder="kasih pendapat lo bukan spoiler ya " style="padding-right: 60px;"></textarea>
                  <label for="photoInput" class="position-absolute top-50 end-0 translate-middle-y me-3 p-2 btn btn-outline-light btn-sm rounded-circle camera-btn" title="Tambah foto">
                    <i class="bi bi-camera-fill fs-5"></i>
                    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display: none;">
                  </label>
                </div>
                <img id="photoPreview" class="img-thumbnail rounded shadow-sm d-none w-100 mb-3" alt="Preview foto komentar">
              </div>

              
              <button type="submit" class="btn btn-custom btn-lg w-100">🚀 Tambah Review</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container mb-5">
    <div class="reviews-grid" id="reviewsGrid"></div>
  </div>

  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold">📋 Detail Review</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body fs-5" id="modalBody"></div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer text-center p-5 mt-5">
    <div class="container">
      <p class="mb-3 fs-5">© 2026 Review Netizen - Dibuat dengan kejujuran Netizen</p>
      <div class="d-flex justify-content-center gap-4">
        <a href="#" class="text-white">📱 Instagram : @cumilovt</a>
        <a href="#" class="text-white">📧 Email : muhammad.akbar.din.islami@gmail.com</a>
      </div>
    </div>
  </footer>

  <script src="./js/bootstrap.bundle.min.js"></script>
  <script>
    let dataReview = JSON.parse(localStorage.getItem('dataReview')) || [];

    document.addEventListener('DOMContentLoaded', function() {
      const stars = document.querySelectorAll('#ratingStars img');
      const ratingInput = document.getElementById('rating');
      
      stars.forEach(star => {
        star.addEventListener('click', () => {
          const rating = star.dataset.rating;
          ratingInput.value = rating;
          stars.forEach((s, idx) => {
            s.classList.toggle('active', idx < rating);
          });
        });
      });
    });

    document.getElementById("reviewForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const judul = document.getElementById("judul").value;
      const tipe = document.getElementById("tipe").value;
      const rating = document.getElementById("rating").value;
      const komentar = document.getElementById("komentar").value;
      const photo = document.getElementById("photoData").value;

      if (rating === '0') {
        alert('Pilih rating bintang!');
        return;
      }


      dataReview.unshift({judul, tipe, rating, komentar, photo}); 
      localStorage.setItem('dataReview', JSON.stringify(dataReview));
      tampilkanData();



      createConfetti();
      
      this.reset();
      document.getElementById('rating').value = '0';
      document.querySelectorAll('#ratingStars img').forEach(s => s.classList.remove('active'));
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    function tampilkanData() {
      const container = document.getElementById("reviewsGrid");
      container.innerHTML = "";

      dataReview.forEach((item, index) => {
        const reviewCard = document.createElement('div');
        reviewCard.className = `review-card p-4 position-relative`;
        reviewCard.style.animationDelay = `${index * 0.1}s`;
        
        reviewCard.innerHTML = `
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h4 class="mb-2 fw-bold">${item.judul}</h4>
            <span class="badge fs-6 px-3 py-2" style="background: linear-gradient(45deg, #4facfe, #00f2fe);">${item.tipe}</span>
          </div>
          <div class="stars mb-3">
            ${'⭐'.repeat(parseInt(item.rating))}
            <small class="text-muted">(${item.rating}/5)</small>
          </div>
${item.photo ? `<img src="${item.photo}" alt="Foto komentar" class="img-fluid rounded shadow mb-3" style="max-height: 200px; object-fit: cover;">` : ''}
          ${item.komentar ? `<p class="text-light mb-4">${item.komentar}</p>` : ''}
          <div class="d-flex gap-2">

            <button class="btn btn-primary btn-sm px-4" onclick="detail(${index})">👁️ Detail</button>
            <button class="btn btn-danger btn-sm px-4" onclick="hapus(${index})">🗑️ Hapus</button>
          </div>
        `;
        container.appendChild(reviewCard);
      });
    }

    function hapus(index) {
      dataReview.splice(index, 1);
      localStorage.setItem('dataReview', JSON.stringify(dataReview));
      tampilkanData();
    }

    function detail(index) {
      const item = dataReview[index];
      document.getElementById("modalBody").innerHTML = `
        <div class="text-center mb-4">
          <h2 class="fw-bold mb-2">${item.judul}</h2>
          <span class="badge fs-5 px-4 py-2 mb-3" style="background: linear-gradient(45deg, #4facfe, #00f2fe);">${item.tipe}</span>
          <div class="stars fs-1 mb-3">${'⭐'.repeat(parseInt(item.rating))}</div>
          <p class="text-muted">Rating: ${item.rating}/5</p>
        </div>
        ${item.photo ? `<img src="${item.photo}" alt="Foto komentar" class="img-fluid rounded shadow mb-4" style="max-height: 250px; object-fit: cover;">` : ''}
        ${item.komentar ? `<blockquote class="text-light fs-5">${item.komentar}</blockquote>` : '<p class="text-muted">Tanpa komentar</p>'}
      `;


      const modal = new bootstrap.Modal(document.getElementById('detailModal'));
      modal.show();
    }

    function createConfetti() {
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + '%';
          confetti.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
          document.body.appendChild(confetti);
          
          setTimeout(() => confetti.remove(), 3000);
        }, i * 20);
      }
    }

  
      const photoInput = document.getElementById('photoInput');
      const photoPreview = document.getElementById('photoPreview');
      const photoData = document.createElement('input');
      photoData.type = 'hidden';
      photoData.id = 'photoData';
      photoData.name = 'photo';
      document.getElementById('reviewForm').appendChild(photoData);

      photoInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            photoData.value = e.target.result;
            photoPreview.src = e.target.result;
            photoPreview.classList.remove('d-none');
          };
          reader.readAsDataURL(file);
        } else {
          photoData.value = '';
          photoPreview.classList.add('d-none');
        }
      });

      document.getElementById('reviewForm').addEventListener('reset', function() {
        photoData.value = '';
        photoPreview.src = '';
        photoPreview.classList.add('d-none');
        photoInput.value = '';
      });

    tampilkanData();
  </script>
</xai:function_call > 

<xai:function_call name="edit_file">
<parameter name="path">assets/index.html
</body>
</html>
